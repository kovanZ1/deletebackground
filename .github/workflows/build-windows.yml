name: Build Windows EXE

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Build EXE (PyInstaller)
        run: pyinstaller --noconfirm casecut.spec

      - name: Portable ZIP
        run: powershell Compress-Archive -Path dist/CaseCutoutTool/* -DestinationPath CaseCutoutTool-portable.zip

      - name: Installer (Inno Setup)
        run: |
          choco install innosetup -y --no-progress
          iscc installer\casecut.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CaseCutoutTool-windows
          path: |
            CaseCutoutTool-portable.zip
            installer/Output/*.exe

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CaseCutoutTool-portable.zip
            installer/Output/*.exe
